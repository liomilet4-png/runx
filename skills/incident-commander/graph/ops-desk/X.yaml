skill: incident-commander-ops-desk
version: "0.1.1"

catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: graph-stage
  part_of:
    - runx/incident-commander

runners:
  advance:
    default: true
    type: agent-task
    agent: operator
    task: ops-desk-advance
    outputs:
      effect_family: string
      operation: string
      decision: string
      dispatch: object
      escalation: object
      resolution: object
      reason: string
    artifacts:
      wrap_as: dispatch_decision
      packet: runx.effect.transition.v1
    instructions: >
      Apply the pinned runx ops-desk advance contract to one declared incident
      turn. Return effect_family incident-commander and operation matching the
      selected decision. Choose exactly one of dispatch one fixed-roster member,
      escalate, or done. Never name a member or skill outside candidate_roster,
      never widen a member's needed scope beyond its ceiling, and never claim
      consequential work complete without approval and receipt evidence. Select
      the smallest useful move toward the incident objective. This stage only
      returns a typed decision; it performs no dispatch, send, state append, or
      authority change.
    inputs:
      mandate:
        type: string
        required: true
        description: One bounded incident objective.
      case_state:
        type: json
        required: true
        description: Folded incident state supplied by the agency driver.
      candidate_roster:
        type: json
        required: true
        description: Fixed incident roster with role, principal, skill, and scope ceiling.
      scope_ref:
        type: string
        required: true
        description: Declared incident case id.
      approval_context:
        type: json
        required: false
        description: Approval principal and reason carried by the agency approval path.
      operator_policy:
        type: string
        required: false
        description: Incident-specific stopping and evidence rules.
      project_profile:
        type: string
        required: false
        description: Optional topology and verification context, never authority.
