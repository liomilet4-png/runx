<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Basic runx business ops graph</title>
  <desc id="desc">A product-style diagram showing one business signal entering the runx business-ops skill, fanning out to docs, release, issue-to-PR, send draft, spend quote, and audit lanes, then producing receipts or stopping at approval gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path class="arrow" d="M1 1 L9 5 L1 9 Z"/>
    </marker>
    <style>
      .bg { fill: #fbfcff; }
      .panel { fill: #ffffff; stroke: #d9dee8; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #d9dee8; stroke-width: 1.5; }
      .skill { fill: #fff5fa; stroke: #ff2e88; stroke-width: 1.7; }
      .lane { fill: #f8fafc; stroke: #d9dee8; stroke-width: 1.2; }
      .gate { fill: #fff5fa; stroke: #ff98c4; stroke-width: 1.4; }
      .receipt { fill: #f4fbff; stroke: #9bd7ff; stroke-width: 1.4; }
      .rail { fill: none; stroke: #c4cad6; stroke-width: 2; }
      .line { fill: none; stroke: #8a93a3; stroke-width: 1.6; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #a8afbd; stroke-width: 1.3; marker-end: url(#arrow); }
      .arrow { fill: #8a93a3; }
      .accent { fill: #ff2e88; }
      .dot { fill: #ff2e88; }
      .title { fill: #111827; font: 750 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #111827; font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #4b5563; font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #6b7280; font: 650 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.04em; }
      .chip-text { fill: #6b7280; font: 650 10px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.03em; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #080b12; }
        .panel { fill: #0d111a; stroke: #2b3343; }
        .card { fill: #111827; stroke: #30384a; }
        .skill { fill: #1a101c; stroke: #ff2e88; }
        .lane { fill: #101723; stroke: #30384a; }
        .gate { fill: #1a101c; stroke: #7a395b; }
        .receipt { fill: #0e1721; stroke: #315b78; }
        .rail { stroke: #3a4354; }
        .line { stroke: #9aa3b5; }
        .line-soft { stroke: #6f7889; }
        .arrow { fill: #9aa3b5; }
        .title, .text { fill: #f9fafb; }
        .small { fill: #c6ceda; }
        .label, .chip-text { fill: #9ca3af; }
      }
    </style>
  </defs>

  <rect class="bg" width="1120" height="420" rx="16"/>
  <rect class="panel" x="24" y="24" width="1072" height="372" rx="14"/>

  <text class="label" x="56" y="62">business-ops quickstart</text>
  <text class="title" x="56" y="90">One prompt becomes a governed operator graph.</text>
  <text class="small" x="56" y="114">The public skill is a fixture. Teams swap in private context, policies, tools, approval gates, and readbacks.</text>

  <rect class="card" x="56" y="178" width="172" height="86" rx="8"/>
  <circle class="dot" cx="84" cy="206" r="5"/>
  <text class="label" x="102" y="210">input</text>
  <text class="text" x="84" y="235">signal</text>
  <text class="small" x="84" y="255">launch readiness</text>

  <path class="line" d="M228 221 H302"/>

  <rect class="skill" x="302" y="158" width="192" height="126" rx="10"/>
  <text class="label" x="332" y="192">runx skill</text>
  <text class="title" x="332" y="220">business-ops</text>
  <text class="small" x="332" y="244">classify</text>
  <text class="small" x="402" y="244">route</text>
  <text class="small" x="452" y="244">gate</text>
  <path class="accent" d="M332 262 H464 V265 H332 Z"/>

  <path class="line" d="M494 221 H548"/>
  <path class="rail" d="M548 156 V320"/>
  <circle class="dot" cx="548" cy="156" r="4"/>
  <circle class="dot" cx="548" cy="320" r="4"/>

  <path class="line-soft" d="M548 156 H606"/>
  <path class="line-soft" d="M548 190 H606"/>
  <path class="line-soft" d="M548 224 H606"/>
  <path class="line-soft" d="M548 258 H606"/>
  <path class="line-soft" d="M548 292 H606"/>
  <path class="line-soft" d="M548 320 H606"/>

  <rect class="lane" x="606" y="140" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="161">docs from evidence</text>

  <rect class="lane" x="606" y="174" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="195">release checks</text>

  <rect class="lane" x="606" y="208" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="229">issue to PR</text>

  <rect class="gate" x="606" y="242" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="263">send draft</text>

  <rect class="gate" x="606" y="276" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="297">spend quote</text>

  <rect class="receipt" x="606" y="310" width="178" height="32" rx="6"/>
  <text class="small" x="626" y="331">receipt audit</text>

  <path class="line-soft" d="M784 156 H850"/>
  <path class="line-soft" d="M784 190 H850"/>
  <path class="line-soft" d="M784 224 H850"/>
  <path class="line-soft" d="M784 258 H850"/>
  <path class="line-soft" d="M784 292 H850"/>
  <path class="line-soft" d="M784 320 H850"/>

  <rect class="receipt" x="850" y="162" width="202" height="70" rx="9"/>
  <text class="label" x="878" y="193">sealed receipt</text>
  <text class="small" x="878" y="214">what ran, under authority</text>

  <rect class="gate" x="850" y="252" width="202" height="70" rx="9"/>
  <text class="label" x="878" y="283">approval gate</text>
  <text class="small" x="878" y="304">send, spend, merge, deploy</text>
</svg>
