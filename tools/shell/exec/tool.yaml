name: shell.exec
description: Execute an explicit command as a high-risk escape hatch.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  command:
    type: string
    required: true
    description: Command to execute.
  args:
    type: json
    required: false
    description: Array of string arguments.
  cwd:
    type: string
    required: false
    description: Working directory override.
  repo_root:
    type: string
    required: false
    description: Repository root fallback for cwd.
scopes:
  - shell.exec
mutating: true
runx:
  artifacts:
    wrap_as: shell_execution
