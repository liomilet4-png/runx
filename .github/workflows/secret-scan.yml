name: secret-scan

# Detect committed secrets (API keys, private keys, tokens) in the checked-out
# tree on every PR and main push. Historical remediation uses an explicit
# baseline/rewrite process; the CI gate protects new changes from adding secrets.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Gitleaks scan
        run: |
          scan_dir="${RUNNER_TEMP}/gitleaks-tree"
          mkdir -p "$scan_dir"
          git archive --format=tar HEAD | tar -xf - -C "$scan_dir"
          gitleaks dir --redact --verbose --exit-code 1 "$scan_dir"
