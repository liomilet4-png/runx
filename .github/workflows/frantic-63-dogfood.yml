name: Frantic 63 dogfood receipt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dogfood:
    runs-on: ubuntu-latest
    env:
      RUNX_RECEIPT_SIGN_KID: frantic-63-ci-dogfood-key
      RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
      RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
      RUNX_RECEIPT_VERIFY_KID: frantic-63-ci-dogfood-key
      RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64: IVL40Zt5HSRFMkLhXy6rbLfP+ntqXtMAl5YOBpiB2xI=
      RUNX_RECEIPTS: ${{ github.workspace }}/.runx/frantic-63-dogfood
      EVIDENCE_DIR: ${{ github.workspace }}/skills/renewal-risk-judge/harness-evidence
      FRANTIC63_PR_URL: https://github.com/runxhq/runx/pull/183

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install runx
        run: npm install -g @runxhq/cli@0.6.13

      - name: Run registry dogfood
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNX_RECEIPTS" "$EVIDENCE_DIR"
          version="sha-${GITHUB_SHA:0:12}"
          package="liomilet4-png/renewal-risk-judge@${version}"
          echo "$version" > "$EVIDENCE_DIR/dogfood-package-version.txt"
          echo "FRANTIC63_PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          runx --version | tee "$EVIDENCE_DIR/dogfood-runx-version.txt"
          runx registry read "$package" --registry https://api.runx.ai --json \
            | tee "$EVIDENCE_DIR/registry-read.json"
          runx add "$package" \
            --registry https://api.runx.ai \
            --to "$RUNNER_TEMP/renewal-risk-judge-install" \
            --json | tee "$EVIDENCE_DIR/dogfood-install.json"
          set +e
          runx skill "$package" \
            --registry https://api.runx.ai \
            --input-json "usage_signals=$(jq -c '.usage_signals' "$EVIDENCE_DIR/dogfood-input.json")" \
            --input-json "support_history=$(jq -c '.support_history' "$EVIDENCE_DIR/dogfood-input.json")" \
            --input-json "payment_snapshot=$(jq -c '.payment_snapshot' "$EVIDENCE_DIR/dogfood-input.json")" \
            --input-json "account_ref=$(jq -c '.account_ref' "$EVIDENCE_DIR/dogfood-input.json")" \
            --input-json "operator_context=$(jq -c '.operator_context' "$EVIDENCE_DIR/dogfood-input.json")" \
            -R "$RUNX_RECEIPTS" \
            --json | tee "$EVIDENCE_DIR/dogfood-initial-run.json"
          skill_status="${PIPESTATUS[0]}"
          set -e
          if [ "$skill_status" -ne 0 ] && [ "$skill_status" -ne 2 ]; then
            exit "$skill_status"
          fi
          run_id="$(jq -r '.run_id // empty' "$EVIDENCE_DIR/dogfood-initial-run.json")"
          test -n "$run_id"
          runx resume "$run_id" "$EVIDENCE_DIR/dogfood-answers.json" \
            -R "$RUNX_RECEIPTS" \
            --json | tee "$EVIDENCE_DIR/dogfood-resume-run.json"
          receipt_path="$(find "$RUNX_RECEIPTS" -maxdepth 1 -name 'sha256:*.json' -type f | head -n 1)"
          test -n "$receipt_path"
          cp "$receipt_path" "$EVIDENCE_DIR/dogfood-receipt.json"
          runx verify --receipt "$EVIDENCE_DIR/dogfood-receipt.json" --json \
            | tee "$EVIDENCE_DIR/dogfood-verify.json"

      - name: Update delivery evidence
        shell: bash
        run: python scripts/frantic-63-update-dogfood-evidence.py

      - name: Commit generated evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "liomilet4-png"
          git config user.email "290201513+liomilet4-png@users.noreply.github.com"
          git add skills/renewal-risk-judge/harness-evidence
          if git diff --cached --quiet; then
            echo "No generated evidence changes"
            exit 0
          fi
          git commit -m "Update Frantic 63 dogfood evidence"
          git push
