name: ci-failure-triage evidence

on:
  push:
    branches:
      - codex/frantic-ci-failure-triage
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    env:
      RUNX_RECEIPT_SIGN_KID: runx-demo-key
      RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
      RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
      RUNX_RECEIPTS: ${{ github.workspace }}/.runx/receipts/ci-failure-triage
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install runx CLI
        run: npm install --global @runxhq/cli@0.6.13

      - name: Prepare evidence directories
        run: |
          mkdir -p .runx/receipts/ci-failure-triage
          mkdir -p .runx/evidence/ci-failure-triage

      - name: Capture runx version
        run: |
          runx --version | tee .runx/evidence/ci-failure-triage/runx-version.txt

      - name: Inspect skill package
        run: |
          runx skill inspect ./skills/ci-failure-triage --json \
            | tee .runx/evidence/ci-failure-triage/skill-inspect.json

      - name: Run local harness
        run: |
          runx harness ./skills/ci-failure-triage -R "$RUNX_RECEIPTS" --json \
            | tee .runx/evidence/ci-failure-triage/harness.json

      - name: Dogfood skill on clear CI failure fixture
        run: |
          ci_failure="$(jq -c '.ci_failure' skills/ci-failure-triage/fixtures/real-break-clear-logs.json)"
          repo_config="$(jq -c '.repo_config' skills/ci-failure-triage/fixtures/real-break-clear-logs.json)"
          escalation_policy="$(jq -c '.escalation_policy' skills/ci-failure-triage/fixtures/real-break-clear-logs.json)"
          runx skill ./skills/ci-failure-triage classify \
            --input-json "ci_failure=${ci_failure}" \
            --input-json "repo_config=${repo_config}" \
            --input-json "escalation_policy=${escalation_policy}" \
            -R "$RUNX_RECEIPTS" \
            --json | tee .runx/evidence/ci-failure-triage/dogfood.json

      - name: Verify harness receipt
        run: |
          receipt_id="$(jq -r '.receipt_ids[0] // empty' .runx/evidence/ci-failure-triage/harness.json)"
          if [ -z "$receipt_id" ]; then
            echo "harness output did not include receipt id" >&2
            cat .runx/evidence/ci-failure-triage/harness.json >&2
            exit 1
          fi
          runx verify "$receipt_id" --receipt-dir "$RUNX_RECEIPTS" --allow-local-development-signatures --json \
            | tee .runx/evidence/ci-failure-triage/verification.json

      - name: Summarize evidence
        run: |
          jq -n \
            --arg runx_version "$(cat .runx/evidence/ci-failure-triage/runx-version.txt)" \
            --slurpfile inspect .runx/evidence/ci-failure-triage/skill-inspect.json \
            --slurpfile harness .runx/evidence/ci-failure-triage/harness.json \
            --slurpfile dogfood .runx/evidence/ci-failure-triage/dogfood.json \
            --slurpfile verification .runx/evidence/ci-failure-triage/verification.json \
            '{
              schema: "runx.ci_failure_triage.evidence.v1",
              summary: "ci-failure-triage package inspected, harnessed, dogfooded, and receipt-verified on Ubuntu GitHub Actions.",
              runx_version: $runx_version,
              observations: [
                {name: "skill_inspect", status: $inspect[0].status, runners: $inspect[0].runners},
                {name: "harness", status: $harness[0].status, case_count: $harness[0].case_count, assertion_error_count: $harness[0].assertion_error_count, receipt_ids: $harness[0].receipt_ids},
                {name: "dogfood", status: $dogfood[0].status, receipt_id: ($dogfood[0].receipt_id // $dogfood[0].receipt.id // $dogfood[0].receipt_ref // null)},
                {name: "verification", status: $verification[0].status, receipt_id: ($verification[0].receipt_id // $verification[0].receipt.id // null)}
              ],
              known_gaps: []
            }' | tee .runx/evidence/ci-failure-triage/evidence.json

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-triage-evidence
          path: |
            .runx/evidence/ci-failure-triage/*.json
            .runx/evidence/ci-failure-triage/*.txt
