skill: agency-plan
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: internal
  role: graph-stage
  part_of:
    - runx/agency

runners:
  default:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    inputs:
      decision:
        type: json
        required: false
        description: The ops-desk dispatch_decision for this turn.
      reduction:
        type: json
        required: true
        description: The folded case projection from agency-reduce.
      member_result:
        type: json
        required: false
        description: The dispatch outcome to persist on this turn event.
      driver_id:
        type: string
        required: true
        description: The driver advancing the case; part of the per-turn contention key.
      case_id:
        type: string
        required: true
        description: The case aggregate id.
