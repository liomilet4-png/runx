name: Frantic 76 evidence

on:
  workflow_dispatch:

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runx CLI
        run: |
          npm install -g @runxhq/cli@0.6.15
          runx --version | tee runx-version-76.txt

      - name: Prepare signing and verification key material
        run: |
          python3 -m pip install --quiet cryptography
          python3 - <<'PY' >> "$GITHUB_ENV"
          import base64
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives import serialization

          seed_b64 = "QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI="
          seed = base64.b64decode(seed_b64)
          pub = Ed25519PrivateKey.from_private_bytes(seed).public_key().public_bytes(
              serialization.Encoding.Raw,
              serialization.PublicFormat.Raw,
          )
          print("RUNX_RECEIPT_SIGN_KID=runx-demo-key")
          print(f"RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64={seed_b64}")
          print("RUNX_RECEIPT_SIGN_ISSUER_TYPE=hosted")
          print("RUNX_RECEIPT_VERIFY_KID=runx-demo-key")
          print(f"RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64={base64.b64encode(pub).decode()}")
          PY

      - name: Run local harness
        run: |
          mkdir -p artifacts/harness-receipts
          runx harness ./skills/meeting-followup --receipt-dir artifacts/harness-receipts --json \
            | tee artifacts/local-harness-76.json

      - name: Read and clean-install published registry package
        run: |
          mkdir -p artifacts/clean-install
          runx registry read liomilet4-png/meeting-followup@sha-408dfab19c54 \
            --registry https://api.runx.ai --json | tee artifacts/registry-read-76.json
          runx add liomilet4-png/meeting-followup@sha-408dfab19c54 \
            --registry https://api.runx.ai --to artifacts/clean-install --json \
            | tee artifacts/clean-install-76.json

      - name: Run published dogfood and verify receipt
        run: |
          mkdir -p artifacts/dogfood-receipts
          transcript="$(tr '\n' ' ' < skills/meeting-followup/fixtures/product-sync-transcript.md)"
          runx skill liomilet4-png/meeting-followup@sha-408dfab19c54 \
            --registry https://api.runx.ai \
            --input "meeting=mtg-2026-07-05-product-sync | Product Sync: Checkout Follow-up | 2026-07-05" \
            --input "transcript=${transcript}" \
            --input "attendees=Maya Chen PM; Omar Patel Engineering; Lina Gomez Support" \
            --input "followup_policy=allowed target: n8n-handoff; timezone: UTC" \
            --receipt-dir artifacts/dogfood-receipts \
            --json | tee artifacts/dogfood-initial-76.json

          cat > artifacts/dogfood-answers-76.json <<'JSON'
          {
            "agent_task.meeting-followup-summarize.output": {
              "summary": {
                "meeting_id": "mtg-2026-07-05-product-sync",
                "title": "Product Sync: Checkout Follow-up",
                "overview": "The team kept the checkout banner experiment limited, delayed saved-card copy pending support review, and prepared follow-up notes and dashboard updates."
              },
              "decisions": [
                {
                  "decision": "Keep the checkout banner experiment at 10 percent until Friday.",
                  "evidence": "Maya: We agreed to keep the checkout banner experiment at 10 percent until Friday."
                },
                {
                  "decision": "Do not ship the saved-card copy change until support reviews the wording.",
                  "evidence": "Lina: Decision: do not ship the saved-card copy change until support reviews the wording."
                }
              ],
              "action_items": [
                {
                  "owner": "Omar Patel",
                  "action": "Prepare the incident review notes and send them to Maya.",
                  "due_date": "2026-07-08",
                  "evidence": "Omar: I will prepare the incident review notes by 2026-07-08 and send them to Maya."
                },
                {
                  "owner": "Lina Gomez",
                  "action": "Complete the support wording review.",
                  "due_date": "2026-07-09",
                  "evidence": "Maya: Lina owns the support wording review. Please finish it by 2026-07-09."
                },
                {
                  "owner": "Omar Patel",
                  "action": "Add open metrics to the weekly dashboard.",
                  "due_date": null,
                  "evidence": "Omar: I can add the open metrics to the weekly dashboard by Friday."
                }
              ],
              "task_proposals": [
                {
                  "target": "n8n-handoff",
                  "title": "Prepare incident review notes",
                  "owner": "Omar Patel",
                  "due_date": "2026-07-08",
                  "requires_approval": true,
                  "evidence": "Omar committed to prepare incident review notes by 2026-07-08 and send them to Maya."
                },
                {
                  "target": "n8n-handoff",
                  "title": "Complete support wording review",
                  "owner": "Lina Gomez",
                  "due_date": "2026-07-09",
                  "requires_approval": true,
                  "evidence": "Maya assigned Lina the support wording review due 2026-07-09."
                },
                {
                  "target": "n8n-handoff",
                  "title": "Update weekly dashboard metrics",
                  "owner": "Omar Patel",
                  "due_date": null,
                  "requires_approval": true,
                  "evidence": "Omar said he can add open metrics to the weekly dashboard by Friday; the date remains null because the transcript does not specify a calendar date."
                }
              ],
              "escalation": {
                "lane": "human_approval_before_handoff",
                "reason": "The skill only proposes n8n-handoff tasks; a separate governed run must approve and send them."
              }
            }
          }
          JSON

          runx resume run_agent_task-meeting-followup-summarize-output \
            artifacts/dogfood-answers-76.json \
            --receipt-dir artifacts/dogfood-receipts \
            --json | tee artifacts/dogfood-resume-76.json

          jq '.receipt' artifacts/dogfood-resume-76.json > artifacts/dogfood-receipt-76.json
          runx verify --receipt artifacts/dogfood-receipt-76.json --json \
            | tee artifacts/verification-76.json

      - name: Build evidence packet and report
        run: |
          mkdir -p artifacts/public
          receipt_ref="runx:receipt:$(jq -r '.receipt_id' artifacts/dogfood-resume-76.json)"
          jq -n \
            --arg runx_version "$(cat runx-version-76.txt)" \
            --arg owner "liomilet4-png" \
            --arg package "meeting-followup" \
            --arg version "sha-408dfab19c54" \
            --arg registry_ref "liomilet4-png/meeting-followup@sha-408dfab19c54" \
            --arg public_url "https://runx.ai/x/liomilet4-png/meeting-followup@sha-408dfab19c54" \
            --arg receipt_ref "$receipt_ref" \
            --slurpfile harness artifacts/local-harness-76.json \
            --slurpfile verification artifacts/verification-76.json \
            --slurpfile registry artifacts/registry-read-76.json \
            --slurpfile dogfood artifacts/dogfood-resume-76.json \
            '{
              schema: "frantic.evidence.meeting_followup.v1",
              observations: {
                runx_version: $runx_version,
                publisher_owner: $owner,
                package_name: $package,
                version: $version,
                registry_ref: $registry_ref,
                public_url: $public_url,
                install_command: "runx add \($registry_ref) --registry https://api.runx.ai",
                dogfood_command: "runx skill \($registry_ref) --registry https://api.runx.ai --json; runx resume run_agent_task-meeting-followup-summarize-output artifacts/dogfood-answers-76.json --json",
                verify_command: "RUNX_RECEIPT_VERIFY_KID=runx-demo-key RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64=<public key> runx verify --receipt dogfood-receipt-76.json --json",
                receipt_ref: $receipt_ref,
                harness_status: $harness[0].status,
                harness_case_names: $harness[0].case_names,
                harness_receipt_ids: $harness[0].receipt_ids,
                verification_valid: $verification[0].valid,
                verification_signature_status: $verification[0].signature.status,
                registry_digest: $registry[0].digest,
                registry_profile_digest: $registry[0].profile_digest,
                decisions_count: ($dogfood[0].payload.decisions | length),
                action_items_count: ($dogfood[0].payload.action_items | length),
                task_proposal_count: ($dogfood[0].payload.task_proposals | length),
                refused_case: "missing_transcript_stop emits needs_agent and no live task creation"
              },
              dogfood: {
                package: $registry_ref,
                input: {
                  meeting: "mtg-2026-07-05-product-sync | Product Sync: Checkout Follow-up | 2026-07-05",
                  transcript_fixture: "skills/meeting-followup/fixtures/product-sync-transcript.md",
                  attendees: ["Maya Chen", "Omar Patel", "Lina Gomez"],
                  followup_policy: "n8n-handoff only, UTC"
                },
                command: "runx skill \($registry_ref) --registry https://api.runx.ai --json",
                receipt_ref: $receipt_ref,
                verify_verdict: $verification[0],
                harness_cases: $harness[0].case_names
              }
            }' > artifacts/public/evidence.json

          cp artifacts/verification-76.json artifacts/public/verification.json
          cat > artifacts/public/report.md <<EOF
          # Frantic #76 Meeting Followup

          - Package: liomilet4-png/meeting-followup@sha-408dfab19c54.
          - Public URL: https://runx.ai/x/liomilet4-png/meeting-followup@sha-408dfab19c54.
          - CLI: $(cat runx-version-76.txt).
          - Local harness on Linux passed both cases: product_sync_followup and missing_transcript_stop.
          - Clean install was checked with runx add from https://api.runx.ai.
          - Dogfood run used the published package and a product-sync transcript fixture.
          - Dogfood output includes two decisions, three action items, and three approval-gated n8n-handoff task proposals.
          - The skill does not create live tasks, send messages, or call n8n.
          - The missing transcript case refuses by returning needs_agent.
          - Verification JSON records the runx verify verdict for the dogfood receipt.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: frantic-76-evidence
          path: |
            runx-version-76.txt
            artifacts/*.json
            artifacts/public/*
