name: git.status
description: Read git working tree status for a repository root.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  repo_root:
    type: string
    required: false
    description: Repository root; defaults to RUNX_CWD or the current working directory.
scopes:
  - git.read
runx:
  artifacts:
    wrap_as: git_status
