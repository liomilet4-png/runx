skill: web-fetch
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

runners:
  web-fetch:
    default: true
    type: agent-task
    agent: researcher
    task: web-fetch
    outputs:
      fetch_result: object
    artifacts:
      named_emits:
        fetch_result: runx.fetch.v1
    runx:
      category: research
    inputs:
      url:
        type: string
        required: true
        description: "Single URL to fetch; its host must match the allowlist."
      allowlist:
        type: json
        required: true
        description: "Permitted hosts or host patterns; the URL and every redirect target must match an entry."
      extract:
        type: string
        required: false
        description: "Extraction mode: text, metadata, or links. Defaults to text."
      max_bytes:
        type: number
        required: false
        description: "Cap on bytes read; a clipped read is flagged truncated in provenance."
