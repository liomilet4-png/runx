name: spec.read_declared_files
description: Read the current contents of files declared in a scafld spec before bounded fix authoring.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  spec_contents:
    type: string
    required: true
    description: Full scafld spec YAML contents to inspect for declared file paths.
  repo_root:
    type: string
    required: false
    description: Repository or workspace root; defaults to fixture, project, RUNX_CWD, or the current working directory.
  fixture:
    type: string
    required: false
    description: Workspace root forwarded from chain inputs when repo_root is omitted.
scopes:
  - spec.read_declared_files
runx:
  artifacts:
    wrap_as: declared_file_context
