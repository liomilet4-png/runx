name: x402-pay-approval
steps:
  - id: approve-spend
    run:
      type: approval
    inputs:
      gate_id: spend-approval
      gate_type: payment
      reason: Approve x402 payment before fulfillment.
      amount_minor: 125
      currency: USD
    artifacts:
      wrap_as: payment_approval
  - id: fulfill
    skill: ../../skills/payment-fulfill
    scopes:
      - payment:spend
    inputs:
      reserved_payment_authority:
        parent_authority:
          term_id: parent
          principal_ref:
            type: principal
            uri: runx:principal:merchant-agent
          resource_ref:
            type: grant
            uri: runx:payment-grant:checkout
          resource_family: effect
          verbs:
            - estimate
            - prepare
            - commit
            - verify
          bounds:
            effect_limits:
              - family: payment
                unit: USD
                max_per_call_units: 10000
                max_per_run_units: 25000
                channels:
                  - mock
                  - card
                peer: merchant-123
                operation: checkout
                authorization_form: single_use_capability
                preflight_required: true
                commitment_required: true
                idempotency_required: true
                recovery_required: true
                receipt_before_success: true
                single_use_capability: true
          capabilities:
            - effect_single_use_capability
          expires_at: 2026-05-21T00:00:00Z
          issued_by_ref:
            type: grant
            uri: runx:grant:issuer
          credential_ref:
            type: credential
            uri: runx:credential:payment-session
        child_authority:
          term_id: child
          principal_ref:
            type: principal
            uri: runx:principal:merchant-agent
          resource_ref:
            type: grant
            uri: runx:payment-grant:checkout
          resource_family: effect
          verbs:
            - prepare
            - commit
          bounds:
            effect_limits:
              - family: payment
                unit: USD
                max_per_call_units: 2500
                max_per_run_units: 25000
                channels:
                  - mock
                  - card
                peer: merchant-123
                operation: checkout
                authorization_form: single_use_capability
                preflight_required: true
                commitment_required: true
                idempotency_required: true
                recovery_required: true
                receipt_before_success: true
                single_use_capability: true
          capabilities:
            - effect_single_use_capability
          expires_at: 2026-05-21T00:00:00Z
          issued_by_ref:
            type: grant
            uri: runx:grant:issuer
          credential_ref:
            type: credential
            uri: runx:credential:payment-session
        reservation_decision:
          decision_id: decision_payment_reservation
          choice: continue
          inputs:
            signal_refs: []
            target_ref: null
            opportunity_refs: []
            selection_ref: null
          proposed_intent:
            purpose: complete a bounded x402 checkout payment
            legitimacy: authorized by selected reservation decision
            success_criteria: []
            constraints: []
            derived_from: []
          selected_act_id: act_fulfill
          selected_harness_ref: null
          justification:
            summary: reservation selected a bounded x402 spend act
            evidence_refs: []
          closure: null
          artifact_refs: []
        subset_proof:
          parent_authority_ref:
            type: grant
            uri: runx:payment-grant:checkout
          comparison_algorithm: runx.payment-authority-subset.v1
          result: subset
          compared_terms:
            - child_term_id: child
              parent_term_id: parent
              relation: subset
          checked_at: 2026-05-22T00:00:00Z
        child_harness_ref:
          type: harness
          uri: runx:harness:x402-pay-approval_fulfill
        spend_capability_binding:
          child_harness_ref:
            type: harness
            uri: runx:harness:x402-pay-approval_fulfill
          act_id: act_fulfill
          reservation_decision_id: decision_payment_reservation
          idempotency_key: payment:x402-pay-approval-001
          amount_minor: 125
          currency: USD
          counterparty: merchant-123
          rail: mock
        consumed_spend_capability_refs: []
      spend_capability_ref:
        type: credential
        uri: runx:payment-capability:spend-1
      idempotency:
        key: payment:x402-pay-approval-001
policy:
  guards:
    - step: fulfill
      field: approve-spend.payment_approval.data.approved
      equals: true
